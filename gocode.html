<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Runner Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Arial,sans-serif;
}

.topbar{
    background:#1b1b1b;
    border-bottom:1px solid #333;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

button{
    border:none;
    padding:12px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:14px;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.run{
    background:#00c853;
    color:#fff;
}

.open{
    background:#607d8b;
    color:#fff;
}

.select{
    background:#9c27b0;
    color:#fff;
}

.copy{
    background:#2196f3;
    color:#fff;
}

.cut{
    background:#ff9800;
    color:#fff;
}

.delete{
    background:#ff3d3d;
    color:#fff;
}

textarea{
    flex:1;
    width:100%;
    border:none;
    outline:none;
    resize:none;
    background:#0d0d0d;
    color:#00ff99;
    padding:20px;
    font-size:15px;
    line-height:1.5;
    font-family:Consolas,monospace;
}
</style>
</head>
<body>

<div class="topbar">

    <button class="run" onclick="runCode()">▶ Run</button>

    <button class="open" onclick="openHtmlFile()">
        📂 Open HTML
    </button>

    <button class="select" onclick="selectAllText()">
        📌 Select All
    </button>

    <button class="copy" onclick="copyText()">
        📋 Copy
    </button>

    <button class="cut" onclick="cutText()">
        ✂ Cut
    </button>

    <button class="delete" onclick="deleteText()">
        🗑 Delete
    </button>

</div>

<input
type="file"
id="fileInput"
accept=".html,.htm,text/html"
style="display:none"
>

<textarea
id="code"
placeholder="Nhập code HTML ở đây..."
></textarea>

<script>

const textarea = document.getElementById("code");
const fileInput = document.getElementById("fileInput");

function runCode(){

    const code = textarea.value;

    const newTab = window.open();

    if(!newTab){
        alert("Trình duyệt đã chặn popup.");
        return;
    }

    newTab.document.open();
    newTab.document.write(code);
    newTab.document.close();
}

function openHtmlFile(){

    fileInput.click();

}

fileInput.addEventListener("change",function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        textarea.value = event.target.result;

    };

    reader.readAsText(file,"UTF-8");

});

function selectAllText(){

    textarea.focus();
    textarea.select();

}

async function copyText(){

    try{

        await navigator.clipboard.writeText(textarea.value);

        alert("Đã copy");

    }catch{

        textarea.select();
        document.execCommand("copy");

    }

}

async function cutText(){

    try{

        await navigator.clipboard.writeText(textarea.value);

    }catch{}

    textarea.value = "";

}

function deleteText(){

    textarea.value = "";
    textarea.focus();

}

</script>

</body>
</html>
