<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GPS PRO MAX</title>



<style>
body {
  margin: 0;
  background: #f5f5f5;
  color: #222;
  font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
  text-align: center;
}
#container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  align-items: center;
  justify-content: center;
}
.mobile-frame {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 32px #0002, 0 1.5px 8px #2222;
  max-width: 430px;
  width: 100vw;
  min-width: 280px;
  margin: 0 auto;
  height: 98vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1.5px solid #e0e0e0;
}
#map {
  height: 65vh;
  min-height: 140px;
  width: 100%;
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  transition: height 0.1s;
  box-shadow: 0 2px 8px #0001;
}
#resizer {
  height: 8px;
  background: #e0e0e0;
  cursor: row-resize;
  width: 100%;
  z-index: 10;
}
#speed {
  font-size: 38px;
  margin-top: 12px;
  font-weight: 700;
  color: #1976d2;
  letter-spacing: 1px;
  text-shadow: 0 1px 0 #fff8;
}
#info {
  margin-top: 10px;
  color: #444;
  line-height: 1.7;
  font-size: 15.5px;
  word-break: break-word;
  background: #f8f9fa;
  border-radius: 12px;
  box-shadow: 0 1px 4px #0001;
  padding: 10px 8px 10px 8px;
}
button {
  padding: 10px 16px;
  margin: 5px 2px;
  border-radius: 16px;
  border: none;
  background: #fff;
  color: #1976d2;
  font-size: 18px;
  font-weight: 500;
  box-shadow: 0 2px 8px #1976d222, 0 1px 2px #0001;
  transition: background 0.18s, color 0.18s, box-shadow 0.18s;
  outline: none;
  cursor: pointer;
}
button:active, button:focus {
  background: #e3f2fd;
  color: #0d47a1;
  box-shadow: 0 1px 2px #1976d211;
}
button#toggleInfoBtn {
  background: #e3f2fd;
  color: #1976d2;
  font-size: 15px;
  margin-top: 2px;
  margin-bottom: 8px;
  box-shadow: none;
}
button#toggleInfoBtn:active {
  background: #bbdefb;
}
input[type="file"] {
  display: none;
}
@media (max-width: 480px) {
  .mobile-frame {
    max-width: 100vw;
    border-radius: 0;
    height: 100vh;
  }
  #map {
    border-radius: 0;
  }
}
</style>
</head>

<body>


<div id="container">
  <div class="mobile-frame">
    <div id="map"></div>
    <div id="resizer"></div>
    <div id="info-container" style="padding: 0 10px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start;">
      <div id="speed">0.0 km/h</div>
      <div style="margin-bottom: 8px;">
        <button id="followBtn" onclick="recenter()">📍 Đang theo</button>
        <button onclick="clearPath()">🧹 Xóa</button>
        <button onclick="exportGPX()">📤 Xuất GPX</button>
        <button onclick="document.getElementById('gpxInput').click()">📥 Nạp GPX</button>
        <input type="file" id="gpxInput" accept=".gpx" style="display:none" onchange="importGPX(event)">
        <button onclick="setMapType('road')">🛣️ Đường</button>
        <button onclick="setMapType('sat')">🛰️ Vệ tinh</button>
      </div>
      <button id="toggleInfoBtn" style="margin-bottom:8px;">Hiện thông số ▼</button>
      <div id="info" style="overflow-y:auto; max-height:30vh; display:none;">Đang khởi động GPS...</div>
    </div>
  <script>
  // Ẩn/hiện chỉ phần thông số chi tiết (info), luôn hiện speed
  const toggleInfoBtn = document.getElementById('toggleInfoBtn');
  const infoDiv = document.getElementById('info');
  let infoVisible = false;

  toggleInfoBtn.onclick = function() {
    infoVisible = !infoVisible;
    if (infoVisible) {
      infoDiv.style.display = '';
      toggleInfoBtn.innerText = 'Ẩn thông số ▲';
    } else {
      infoDiv.style.display = 'none';
      toggleInfoBtn.innerText = 'Hiện thông số ▼';
    }
  };
  </script>
  </div>
</div>


<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<!-- Google Fonts Roboto -->
<link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>
// ===== RESIZER =====
const mapDiv = document.getElementById('map');
const resizer = document.getElementById('resizer');
let isResizing = false, startY = 0, startHeight = 0;

resizer.addEventListener('mousedown', function(e) {
  isResizing = true;
  startY = e.clientY;
  startHeight = mapDiv.offsetHeight;
  document.body.style.userSelect = 'none';
});

window.addEventListener('mousemove', function(e) {
  if (!isResizing) return;
  let dy = e.clientY - startY;
  let newHeight = Math.max(100, startHeight + dy);
  mapDiv.style.height = newHeight + 'px';
  if (window.map) map.invalidateSize();
});

window.addEventListener('mouseup', function() {
  isResizing = false;
  document.body.style.userSelect = '';
});


// ===== LOAD =====
let savedPath = JSON.parse(localStorage.getItem("path") || "[]");

let map = L.map('map').setView([10.8231, 106.6297], 15);

// Tile layers
let roadLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
});
let satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Tiles © Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
});

roadLayer.addTo(map);

function setMapType(type) {
  if (type === 'road') {
    map.removeLayer(satLayer);
    roadLayer.addTo(map);
  } else if (type === 'sat') {
    map.removeLayer(roadLayer);
    satLayer.addTo(map);
  }
}

let marker = L.marker([10.8231, 106.6297]).addTo(map);
let polyline = L.polyline(savedPath, { color: 'lime', weight: 5 }).addTo(map);
let followMode = true, lastBearing = 0, points = [];

map.on('dragstart', () => {
  followMode = false;
  followBtn.innerText = "📍 Bật theo";
});

function smartFollow(latlng) {
  let d = map.distance(map.getCenter(), latlng);
  if (followMode && d > 30) map.panTo(latlng);
}

function recenter() {
  followMode = true;
  followBtn.innerText = "📍 Đang theo";
}

function clearPath() {
  savedPath = [];
  localStorage.removeItem("path");
  polyline.setLatLngs([]);
}

function exportGPX() {
  if (!savedPath.length) return alert("Không có dữ liệu");
  let gpx = `<?xml version="1.0"?><gpx><trk><trkseg>`;
  savedPath.forEach(p => {
    gpx += `<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`;
  });
  gpx += `</trkseg></trk></gpx>`;
  let blob = new Blob([gpx]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "track.gpx";
  a.click();
}

// ===== GPX IMPORT =====
function importGPX(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    // Parse GPX
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "application/xml");
    const trkpts = xml.getElementsByTagName("trkpt");
    if (!trkpts.length) {
      alert("Không tìm thấy dữ liệu GPX");
      return;
    }
    let newPath = [];
    for (let i = 0; i < trkpts.length; i++) {
      const lat = parseFloat(trkpts[i].getAttribute("lat"));
      const lon = parseFloat(trkpts[i].getAttribute("lon"));
      newPath.push([lat, lon]);
    }
    if (newPath.length) {
      savedPath = newPath;
      localStorage.setItem("path", JSON.stringify(savedPath));
      polyline.setLatLngs(savedPath);
      if (savedPath.length) {
        map.fitBounds(polyline.getBounds());
        marker.setLatLng(savedPath[savedPath.length - 1]);
      }
      document.getElementById("info").innerHTML = `Đã nạp ${savedPath.length} điểm từ GPX.`;
    }
  };
  reader.readAsText(file);
}

// ===== DIST =====
function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== BEARING =====
function getBearing(a,b,c,d){
  let y=Math.sin((d-b)*Math.PI/180)*Math.cos(c*Math.PI/180);
  let x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-
        Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
        Math.cos((d-b)*Math.PI/180);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// ===== ADDRESS (CACHE) =====
let addrCache={}, addrTime={};

async function getAddress(lat,lon){
  let key = lat.toFixed(4)+","+lon.toFixed(4);
  let now = Date.now();

  if(addrCache[key] && now - addrTime[key] < 10000){
    return addrCache[key];
  }

  try{
    let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    let d=await r.json();
    let a=d.address||{};

    let result={
      road:a.road||"Không rõ",
      location:[a.suburb,a.city_district,a.city].filter(Boolean).join(", ")
    };

    addrCache[key]=result;
    addrTime[key]=now;

    return result;

  }catch{
    return {road:"Không rõ", location:""};
  }
}

// ===== SPEED LIMIT =====
function estimateSpeedLimit(n){
  if(!n) return null;
  n=n.toLowerCase();
  if(n.includes("cao tốc")) return 100;
  if(n.includes("quốc lộ")) return 80;
  if(n.includes("đường")) return 50;
  return 40;
}

// ===== TOLL (CÓ ĐỊA CHỈ) =====
async function getToll(lat,lon){
  try{
    let r=await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node(around:5000,${lat},${lon})["barrier"="toll_booth"];out;`);
    let d=await r.json();

    if(!d.elements.length) return "";

    let e=d.elements[0];
    let dist=getDistance(lat,lon,e.lat,e.lon);

    let addr=await getAddress(e.lat,e.lon);

    return `${dist.toFixed(1)} km<br>
            📍 ${addr.road}<br>
            🏙️ ${addr.location}`;

  }catch{return "";}
}

// ===== STOP (CÓ ĐỊA CHỈ) =====
async function getStop(lat,lon){
  try{
    let r=await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node(around:20000,${lat},${lon})["amenity"~"fuel|restaurant|cafe"];out;`);
    let d=await r.json();

    if(!d.elements.length) return "";

    let e=d.elements[0];
    let dist=getDistance(lat,lon,e.lat,e.lon);

    let name=e.tags?.name||"🛑 Trạm dừng chân";
    let addr=await getAddress(e.lat,e.lon);

    return `${name} • ${dist.toFixed(1)} km<br>
            📍 ${addr.road}<br>
            🏙️ ${addr.location}`;

  }catch{return "";}
}


// ===== MAIN =====
async function update(pos) {
  const { latitude, longitude, accuracy, speed, altitude } = pos.coords;
  let latlng = [latitude, longitude];

  marker.setLatLng(latlng);
  polyline.addLatLng(latlng);

  savedPath.push(latlng);
  localStorage.setItem("path", JSON.stringify(savedPath));

  smartFollow(latlng);

  points.push({ lat: latitude, lon: longitude });
  if (points.length > 2) {
    lastBearing = getBearing(points[points.length - 2].lat, points[points.length - 2].lon, latitude, longitude);
  }

  let addr = await getAddress(latitude, longitude);
  let limit = estimateSpeedLimit(addr.road);
  let toll = await getToll(latitude, longitude);
  let stop = await getStop(latitude, longitude);

  document.getElementById("speed").innerText = (speed ? speed * 3.6 : 0).toFixed(1) + " km/h";

  document.getElementById("info").innerHTML =
    `📍 <b>Tên đường:</b> ${addr.road}<br>
     🏙️ <b>Địa phận:</b> ${addr.location}<br>
     🚧 <b>Tốc độ cho phép:</b> ${limit || "??"} km/h<br>
     🚏 <b>Trạm thu phí phía trước:</b><br>${toll || "Đang tìm..."}<br>
     🛑 <b>Trạm dừng chân phía trước:</b><br>${stop || "Đang tìm..."}<br>
     🌐 <b>Tọa độ:</b> ${latitude.toFixed(6)}, ${longitude.toFixed(6)}<br>
     🧭 <b>Hướng:</b> ${lastBearing.toFixed(0)}°<br>
     🏔️ <b>Độ cao:</b> ${altitude ? altitude.toFixed(1) + " m" : "Không có"}<br>
     🎯 <b>Sai số:</b> ${accuracy.toFixed(0)} m`;
}


// ===== START =====
window.addEventListener('load', () => {
  navigator.geolocation.watchPosition(
    update,
    err => {
      let msg = "Lỗi GPS";
      if (err.code === 1) msg = "❌ Chưa cấp quyền vị trí";
      if (err.code === 2) msg = "❌ Không lấy được vị trí";
      if (err.code === 3) msg = "❌ GPS quá chậm";
      document.getElementById("info").innerHTML = msg;
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
});

</script>

</body>
</html>>
