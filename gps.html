<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>GPS Tracker Ultimate</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; background:#000; color:#0f0; font-family:Arial; text-align:center; }
#map { height:50vh; }
#speed { font-size:55px; margin-top:10px; font-weight:bold; }
#info { margin-top:10px; color:#ccc; line-height:1.6; }
button { padding:10px 14px; margin:5px; border-radius:10px; border:none; background:#0f0; color:#000; font-weight:bold; }
</style>
</head>

<body>

<div id="map"></div>

<div id="speed">0.0 km/h</div>

<div>
  <button id="followBtn" onclick="recenter()">📍 Đang theo</button>
  <button onclick="clearPath()">🧹 Xóa dữ liệu</button>
  <button onclick="exportGPX()">📤 Xuất GPX</button>
</div>

<div id="info">Đang khởi động...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== LOAD PATH =====
let savedPath = JSON.parse(localStorage.getItem("path") || "[]");

// ===== MAP =====
let map = L.map('map').setView([10.8231,106.6297],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = L.marker([10.8231,106.6297]).addTo(map);
let path = L.polyline(savedPath, {color:'lime', weight:5}).addTo(map);

let points = [];
let lastBearing = 0;
let followMode = true;

// ===== FOLLOW =====
function smartFollow(latlng){
  let dist = map.distance(map.getCenter(), latlng);

  if(followMode){
    if(dist > 30) map.panTo(latlng);
  } else {
    if(dist > 120) map.panTo(latlng);
  }
}

map.on("dragstart", ()=>{
  followMode = false;
  document.getElementById("followBtn").innerText = "📍 Bật theo";
});

function recenter(){
  followMode = true;
  document.getElementById("followBtn").innerText = "📍 Đang theo";
}

// ===== CLEAR =====
function clearPath(){
  if(confirm("Xóa toàn bộ hành trình?")){
    savedPath = [];
    localStorage.removeItem("path");
    path.setLatLngs([]);
  }
}

// ===== EXPORT GPX =====
function exportGPX(){

  if(!savedPath.length){
    alert("Không có dữ liệu!");
    return;
  }

  let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GPS Tracker">
<trk><name>Hanh trinh</name><trkseg>
`;

  savedPath.forEach(p=>{
    gpx += `<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`;
  });

  gpx += `</trkseg></trk></gpx>`;

  let blob = new Blob([gpx], {type:"application/gpx+xml"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "hanh_trinh.gpx";
  a.click();

  URL.revokeObjectURL(url);
}

// ===== DISTANCE =====
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ===== BEARING =====
function getBearing(lat1, lon1, lat2, lon2){
  let y = Math.sin((lon2-lon1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);
  let x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
          Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.cos((lon2-lon1)*Math.PI/180);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}

function getDirectionText(b){
  if (b < 45 || b >= 315) return "Bắc ↑";
  if (b < 135) return "Đông →";
  if (b < 225) return "Nam ↓";
  return "Tây ←";
}

// ===== ADDRESS =====
let lastAddr="", lastTime=0;

async function getAddress(lat, lon){
  let now = Date.now();
  if(now-lastTime<5000) return lastAddr;

  try{
    let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    let d = await res.json();
    let a = d.address || {};

    let road = a.road || d.display_name || "Không rõ";
    let ward = a.suburb || a.village || "";
    let district = a.city_district || a.county || "";
    let city = a.city || a.state || a.region || "";

    let location = [ward, district, city].filter(Boolean).join(", ");

    lastAddr = {road, location};
    lastTime = now;

    return lastAddr;

  }catch{
    return lastAddr || {road:"Không rõ", location:""};
  }
}

// ===== SPEED LIMIT =====
function estimateSpeedLimit(name){
  if (!name) return null;
  name = name.toLowerCase();
  if (name.includes("cao tốc")) return 100;
  if (name.includes("quốc lộ")) return 80;
  if (name.includes("đường")) return 50;
  return 40;
}

// ===== TOLL =====
let lastToll="", lastTollTime=0;

async function getToll(lat, lon, bearing){
  let now = Date.now();
  if(now - lastTollTime < 10000) return lastToll;

  try{
    let res = await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node(around:5000,${lat},${lon})["barrier"="toll_booth"];out;`);
    let d = await res.json();

    let best=null, bestDist=999;

    d.elements.forEach(e=>{
      let dist=getDistance(lat,lon,e.lat,e.lon);
      let b=getBearing(lat,lon,e.lat,e.lon);
      let diff=Math.abs(bearing-b);
      if(diff>180) diff=360-diff;

      if(diff<60 && dist<bestDist){
        best=e;
        bestDist=dist;
      }
    });

    if(!best) return "";

    lastToll = bestDist.toFixed(1)+" km";
    lastTollTime = now;
    return lastToll;

  }catch{
    return "";
  }
}

// ===== STOP =====
let lastStop="", lastStopTime=0;

async function getStop(lat, lon, bearing){
  let now = Date.now();
  if(now - lastStopTime < 15000) return lastStop;

  try{
    let res = await fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node(around:20000,${lat},${lon})["amenity"~"fuel|restaurant|cafe|fast_food|parking"];out;`);
    let d = await res.json();

    let best=null, bestDist=999;

    d.elements.forEach(e=>{
      let dist=getDistance(lat,lon,e.lat,e.lon);
      let b=getBearing(lat,lon,e.lat,e.lon);
      let diff=Math.abs(bearing-b);
      if(diff>180) diff=360-diff;

      if(diff<70 && dist<bestDist){
        best=e;
        bestDist=dist;
      }
    });

    if(!best) return "";

    let name = best.tags?.name || "🛑 Trạm dừng chân";

    lastStop = `${name} • ${bestDist.toFixed(1)} km`;
    lastStopTime = now;

    return lastStop;

  }catch{
    return "";
  }
}

// ===== MAIN =====
async function update(pos){

  const {latitude, longitude, accuracy, speed, altitude} = pos.coords;

  if(accuracy > 50) return;

  let latlng = [latitude, longitude];

  marker.setLatLng(latlng);
  path.addLatLng(latlng);

  savedPath.push(latlng);
  if(savedPath.length > 5000) savedPath.shift();
  localStorage.setItem("path", JSON.stringify(savedPath));

  smartFollow(latlng);

  points.push({lat:latitude, lon:longitude});
  if(points.length > 2){
    lastBearing = getBearing(points[points.length-2].lat, points[points.length-2].lon, latitude, longitude);
  }

  let addr = await getAddress(latitude, longitude);
  let limit = estimateSpeedLimit(addr.road);

  let toll = await getToll(latitude, longitude, lastBearing);
  let stop = await getStop(latitude, longitude, lastBearing);

  document.getElementById("speed").innerText =
    (speed ? speed*3.6 : 0).toFixed(1) + " km/h";

  document.getElementById("info").innerHTML =
    `📍 ${addr.road}<br>
     🏙️ ${addr.location}<br>
     🚧 Đoạn đường cho phép chạy tốc độ: ${limit ? limit+" km/h" : "Đang xác định"}<br>
     🚏 Trạm thu phí: ${toll || "Đang tìm..."}<br>
     🛑 Trạm dừng chân: ${stop || "Đang tìm..."}<br>
     🌐 ${latitude.toFixed(6)}, ${longitude.toFixed(6)}<br>
     🧭 ${getDirectionText(lastBearing)} (${lastBearing.toFixed(0)}°)<br>
     🏔️ ${altitude ? altitude.toFixed(1)+" m" : "--"}<br>
     🎯 Sai số: ${accuracy.toFixed(0)} m`;
}

navigator.geolocation.watchPosition(update, console.error, {
  enableHighAccuracy:true
});

</script>

</body>
</html>
