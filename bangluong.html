
<!DOCTYPE html>
<html style="zoom:90%;">
<head>
    <meta charset="utf-8">
    <title>Workforce 365 HRM Pro - Bảng Lương Nhân Viên</title>
    <link rel="icon" type="image/png" href="iconlogo.png">
    <style>
        :root {
            --primary-900: #0f4c81;
            --primary-700: #1976d2;
            --primary-500: #2d9cdb;
            --accent: #22c55e;
            --surface: #f8fbff;
            --surface-2: #ffffff;
            --border: #dceeff;
            --text: #16324f;
            --muted: #5b728b;
            --shadow: 0 20px 44px rgba(15, 76, 129, 0.16);
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(25, 118, 210, 0.16), transparent 24%),
                radial-gradient(circle at 85% 10%, rgba(34, 197, 94, 0.12), transparent 20%),
                linear-gradient(135deg, #f4f9ff 0%, #eef5ff 45%, #f8fbff 100%);
            margin: 0;
            padding-left: 270px;
            padding-right: 20px;
            box-sizing: border-box;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.58) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.58) 1px, transparent 1px);
            background-size: 24px 24px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 88%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 1220px;
            margin: 34px auto 28px;
            background: rgba(255,255,255,0.9);
            padding: 28px 28px 32px;
            border-radius: 24px;
            border: 1px solid rgba(132, 179, 224, 0.26);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }
        .salary-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #0f4c81 0%, #1976d2 54%, #2d9cdb 100%);
            color: #fff;
            padding: 18px 22px;
            border-radius: 18px;
            box-shadow: 0 16px 34px rgba(15, 76, 129, 0.28);
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .salary-toolbar::after {
            content: "";
            position: absolute;
            right: -28px;
            bottom: -38px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255,255,255,0.14);
            pointer-events: none;
        }
        .salary-toolbar-title {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.16);
        }
        .salary-toolbar-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .salary-toolbar select,
        .salary-toolbar input {
            padding: 9px 12px;
            border: 1px solid rgba(15, 76, 129, 0.16);
            border-radius: 10px;
            min-width: 180px;
            background: rgba(255,255,255,0.98);
            color: #0f4c81;
            font-weight: 600;
            box-shadow: inset 0 1px 2px rgba(0,0,0,.06);
        }
        .salary-card {
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 16px 36px rgba(25,118,210,0.12);
            border: 1px solid #dceeff;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .salary-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            background: linear-gradient(90deg, #f4faff 0%, #eaf4ff 100%);
            border: 1px solid #dfefff;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }
        .salary-card-title {
            font-size: 1.02rem;
            font-weight: 800;
            color: #19539b;
        }
        .salary-card-subtitle {
            font-size: 0.92rem;
            color: #5a7da4;
            margin-top: 2px;
        }
        .salary-card-badge {
            background: linear-gradient(90deg, #1976d2 0%, #2196f3 100%);
            color: #fff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: 0 6px 14px rgba(25,118,210,0.22);
        }
        .salary-summary-note {
            background: linear-gradient(90deg, #f7fbff 0%, #eef6ff 100%);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #185fa7;
            box-shadow: 0 4px 16px rgba(25,118,210,0.08);
            border-left: 4px solid #1976d2;
        }
        .salary-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin: 10px 0 16px;
        }
        .salary-summary-stat {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 14px;
            background: linear-gradient(135deg, #f8fbff 0%, #eef7ff 100%);
            border: 1px solid #dfefff;
            box-shadow: 0 6px 18px rgba(25,118,210,0.08);
        }
        .salary-summary-stat .icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: rgba(25,118,210,0.12);
            color: #1976d2;
            font-size: 18px;
        }
        .salary-summary-label {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b8cae;
        }
        .salary-summary-value {
            font-size: 1rem;
            font-weight: 800;
            color: #0f4c81;
            margin-top: 2px;
        }
        #salaryTableWrap {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h2 {
            color: #1976d2;
            font-size: 2rem;
            margin-bottom: 18px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px #1976d220;
        }
        table {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            background: #fafcff;
            box-shadow: 0 2px 8px #0001;
        }
        table, th, td {
            border: 1px solid #e3eaf3;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px 6px;
            text-align: center;
            font-size: 15px;
        }
        th {
            background: #e3f0ff;
            color: #1976d2;
            font-weight: 600;
        }
        input[type="number"], input[type="text"], input[type="time"], input[type="month"] {
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #b0bec5;
            font-size: 15px;
            background: #f7fafd;
            transition: border 0.2s;
        }
        input[type="number"]:focus, input[type="text"]:focus, input[type="time"]:focus, input[type="month"]:focus {
            border: 1.5px solid #1976d2;
            outline: none;
            background: #e3f0ff;
        }
        .form-row {
            margin-bottom: 18px;
        }
        .form-row label {
            display: inline-block;
            width: 120px;
            font-weight: 500;
            color: #1976d2;
        }
        .btn {
            background: linear-gradient(90deg, #1976d2 0%, #2d9cdb 100%);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(25,118,210,0.2);
            transition: transform 0.18s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .btn:hover {
            background: linear-gradient(90deg, #1565c0 0%, #1976d2 100%);
            box-shadow: 0 10px 24px rgba(25,118,210,0.26);
            transform: translateY(-1px);
        }
        .shift-setup-table input[type="text"], .shift-setup-table input[type="time"] {
            width: 90px;
        }
        .shift-setup-table th, .shift-setup-table td {
            padding: 7px 4px;
        }
        .shift-setup-table tr td:last-child {
            text-align: center;
        }
        .shift-setup-table tr td button {
            padding: 5px 14px;
            font-size: 14px;
        }
        .shift-setup-table tr td button.btn {
            background: #e53935;
            background: linear-gradient(90deg, #e53935 60%, #ff7043 100%);
        }
        .shift-setup-table tr td button.btn:hover {
            background: #b71c1c;
        }
        .emp-row-color-0 { background: #e8f5e9; }
        .emp-row-color-1 { background: #f3e5f5; }
        .emp-row-color-2 { background: #e3f2fd; }
        .emp-row-color-3 { background: #fffde7; }
        .emp-row-color-4 { background: #fce4ec; }
        .emp-row-color-5 { background: #e0f2f1; }
        .emp-row-color-6 { background: #fbe9e7; }
        /* Employee table wrapper */
        #attTableWrap > div {
            background: #f7fafd;
            border-radius: 14px;
            box-shadow: 0 2px 12px #1976d210;
            padding: 18px 18px 10px 18px;
            margin-bottom: 36px;
            border: 1.5px solid #e3f0ff;
            transition: box-shadow 0.2s;
        }
        #attTableWrap > div:hover {
            box-shadow: 0 6px 24px #1976d230;
        }
        /* Employee name */
        #attTableWrap > div > div {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 12px;
            color: #1976d2;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px #1976d220;
        }
        /* Shift legend */
        #shiftLegend span {
            background: #e3f0ff;
            color: #1976d2;
            border-radius: 6px;
            padding: 4px 12px;
            margin-right: 8px;
            font-size: 15px;
            box-shadow: 0 1px 4px #1976d210;
            display: inline-block;
        }
        #shiftLegend i {
            color: #888;
            font-size: 15px;
        }
        /* Checkbox style */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1976d2;
            cursor: pointer;
            vertical-align: middle; /* Thêm dòng này để căn giữa checkbox */
        }
        /* Sologan fire effect */
        .sologan-fire {
            background: linear-gradient(90deg, #ff9800 0%, #ff5722 40%, #ffd600 60%, #ff9800 100%);
            color: #fff;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 22px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 24px #ff980080, 0 0 16px #ffd60080 inset;
            padding: 16px 0 14px 0;
            letter-spacing: 1.5px;
            text-shadow:
                0 2px 8px #ff9800cc,
                0 0 12px #ffd600cc,
                0 0 2px #fff;
            position: relative;
            overflow: hidden;
            animation: fireGlow 2s infinite alternate;
            cursor: pointer;
            user-select: none;
        }
        @keyframes fireGlow {
            0% {
                box-shadow: 0 4px 24px #ff980080, 0 0 16px #ffd60080 inset;
                text-shadow:
                    0 2px 8px #ff9800cc,
                    0 0 12px #ffd600cc,
                    0 0 2px #fff;
            }
            100% {
                box-shadow: 0 8px 36px #ff5722cc, 0 0 32px #ffd600cc inset;
                text-shadow:
                    0 4px 16px #ff5722cc,
                    0 0 24px #ffd600cc,
                    0 0 6px #fff;
            }
        }
        .sologan-fire .flame {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 38px;
            height: 38px;
            pointer-events: none;
            z-index: 2;
            animation: flameMove 1.2s infinite alternate;
        }
        @keyframes flameMove {
            0% { transform: translateX(-50%) scaleY(1); opacity: 1; }
            100% { transform: translateX(-50%) scaleY(1.18); opacity: 0.85; }
        }
        .sologan-fire .flame svg {
            display: block;
            width: 38px;
            height: 38px;
        }
        /* Làm nổi bật cột ngày hôm nay */
        .today-col {
            background: #ffe0ef !important; /* màu hồng nhạt */
            color: #d32f2f !important;
            font-weight: bold;
            box-shadow: 0 0 8px #ffd6e6 inset;
        }
        /* Thêm style cho ngày lễ */
        .holiday-col {
            background: #ffe082 !important; /* vàng nhạt */
            color: #b8860b !important;
            font-weight: bold;
            box-shadow: 0 0 8px #ffe082 inset;
        }
        .holiday-marker {
            color: #b8860b;
            font-size: 13px;
            display: block;
            margin-top: 2px;
        }
        /* Responsive */
        @media (max-width: 900px) {
            .container { padding: 12px 2vw; }
            table, th, td { font-size: 13px; }
            #attTableWrap > div > div { font-size: 17px; }
        }
        @media (max-width: 600px) {
            .navbar { flex-direction: column; gap: 8px; padding: 10px 6px; }
            .container { padding: 6px 1vw; }
            h2 { font-size: 1.2rem; }
        }
        /* --- Thêm đoạn này để fix lật ngược camera sau khi quét QR --- */
        #qr-reader video, #qr-reader canvas {
            transform: scaleX(-1) !important;
        }
        /* Khung quét QR nổi bật */
        .qr-scan-frame {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 220px;
            height: 220px;
            transform: translate(-50%, -50%);
            border: 4px solid #00e676;
            border-radius: 18px;
            box-shadow: 0 0 16px #00e67680, 0 0 0 4px #fff8 inset;
            pointer-events: none;
            z-index: 10;
            animation: qrFrameGlow 1.2s infinite alternate;
        }
        @keyframes qrFrameGlow {
            0% { box-shadow: 0 0 16px #00e67680, 0 0 0 4px #fff8 inset; }
            100% { box-shadow: 0 0 32px #00e676cc, 0 0 0 4px #fff8 inset; }
        }
        /* --- Hiệu ứng scan line cho QR --- */
        .qr-scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00e676 0%, #fff 50%, #00e676 100%);
            opacity: 0.85;
            border-radius: 2px;
            box-shadow: 0 0 12px #00e676cc, 0 0 4px #fff;
            animation: qrScanLineMove 1.6s linear infinite;
            z-index: 11;
        }
        @keyframes qrScanLineMove {
            0% { top: 0; }
            100% { top: calc(100% - 3px); }
        }
        #qr-reader {
            position: relative;
            min-height: 240px;
        }
        .qr-animated-wrap {
            position: relative;
            display: inline-block;
        }
        .qr-animated-border {
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 16px;
            pointer-events: none;
            z-index: 2;
            border: 3px solid #1976d2;
            box-shadow: 0 0 18px 4px #1976d2a0, 0 0 0 0 #fff;
            animation: qrBorderColor 3s linear infinite;
        }
        @keyframes qrBorderColor {
            0%   { border-color: #1976d2; box-shadow: 0 0 18px 4px #1976d2a0; }
            20%  { border-color: #43a047; box-shadow: 0 0 18px 4px #43a047a0; }
            40%  { border-color: #ff9800; box-shadow: 0 0 18px 4px #ff9800a0; }
            60%  { border-color: #e53935; box-shadow: 0 0 18px 4px #e53935a0; }
            80%  { border-color: #8e24aa; box-shadow: 0 0 18px 4px #8e24aaa0; }
            100% { border-color: #1976d2; box-shadow: 0 0 18px 4px #1976d2a0; }
        }
        /* --- Thay đổi: làm to bảng chấm công lương ca vừa phải --- */
        .shift-salary-table-big {
            font-size: 18px !important;
            zoom: 1.12;
        }
        .shift-salary-table-big th, .shift-salary-table-big td {
            padding: 10px 6px !important;
            font-size: 15px !important;
        }
        .shift-salary-table-big input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        .shift-salary-table-big input[type="number"],
        .shift-salary-table-big input[type="text"] {
            font-size: 15px !important;
        }
        @media (max-width: 900px) {
            .shift-salary-table-big {
                font-size: 13px !important;
                zoom: 1;
            }
            .shift-salary-table-big th, .shift-salary-table-big td {
                font-size: 13px !important;
                padding: 8px 4px !important;
            }
        }
        @media (max-width: 600px) {
            .shift-salary-table-big {
                font-size: 12px !important;
                zoom: 1;
            }
            .shift-salary-table-big th, .shift-salary-table-big td {
                font-size: 12px !important;
                padding: 5px 2px !important;
            }
        }
        /* --- Thu nhỏ phần cảnh báo Lưu ý --- */
        .notice-warning {
            background: #fff3cd;
            color: #b8860b;
            padding: 10px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 2px 8px #ffc10730;
            border: 1.5px solid #ffc107;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .notice-warning .notice-main {
            flex: 1;
            min-width: 0;
        }
        .notice-warning .notice-title {
            font-size: 1.1rem;
            color: #d32f2f;
            font-weight: bold;
            letter-spacing: 0.5px;
            font-family: 'Segoe UI Semibold','Segoe UI',Arial,sans-serif;
        }
        .notice-warning .notice-bold {
            color: #d32f2f;
            font-size: 1.05rem;
            font-weight: 700;
            display: block;
            margin: 6px 0 6px 0;
            font-family: 'Segoe UI Semibold','Segoe UI',Arial,sans-serif;
        }
        .notice-warning .notice-small {
            color: #d32f2f;
            font-size: 0.98rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0;
            font-family: 'Segoe UI',Arial,sans-serif;
        }
        .notice-warning .notice-qr {
            flex-shrink: 0;
            text-align: center;
        }
        .notice-warning .notice-qr span {
            font-size: 0.98rem;
            color: #1976d2;
            display: block;
            margin-bottom: 6px;
            font-family: 'Segoe UI Semibold','Segoe UI',Arial,sans-serif;
        }
        .notice-warning .qr-animated-wrap img {
            width: 80px !important;
            height: 80px !important;
            border-radius: 8px;
            border: 1.5px solid #1976d2;
        }
        /* Popup holiday calendar style */
        .holiday-calendar-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 4px;
            margin: 0 auto 10px auto;
            background: #f7fafd;
            border-radius: 10px;
            box-shadow: 0 2px 8px #b8860b20;
        }
        .holiday-calendar-table th {
            background: #ffe082;
            color: #b8860b;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            padding: 6px 0;
            border: none;
        }
        .holiday-calendar-table td {
            text-align: center;
            padding: 0;
            border-radius: 8px;
            border: none;
            height: 38px;
            width: 38px;
            position: relative;
            background: #fff;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .holiday-calendar-table td .holiday-checkbox-modal {
            display: none;
        }
        .holiday-calendar-table td label {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 8px;
            line-height: 38px;
            font-size: 15px;
            font-weight: 500;
            color: #b8860b;
            transition: background 0.2s, color 0.2s;
            user-select: none;
            position: relative;
        }
        .holiday-calendar-table td.selected label {
            background: linear-gradient(90deg, #ffe082 60%, #ffd54f 100%);
            color: #fff;
            font-weight: bold;
            box-shadow: 0 2px 8px #ffe08280;
            border: 2px solid #b8860b;
        }
        .holiday-calendar-table td.selected label::after {
            content: "★";
            color: #ff9800;
            font-size: 18px;
            position: absolute;
            top: 2px;
            right: 6px;
            pointer-events: none;
            text-shadow: 0 1px 4px #fff8, 0 0 2px #ff9800;
        }
        .holiday-calendar-table td.today label {
            border: 2px solid #1976d2;
            background: #e3f0ff;
            color: #1976d2;
        }
        .holiday-calendar-table td:hover label {
            background: #ffe08280;
            color: #b8860b;
        }
        .holiday-calendar-table td.disabled label {
            color: #ccc;
            background: #f5f5f5;
            cursor: default;
        }
        @media (max-width: 600px) {
            .holiday-calendar-table td, .holiday-calendar-table th {
                width: 28px;
                height: 28px;
                font-size: 12px;
                line-height: 28px;
            }
        }
        .salary-extra-row {
            background: #f7fafd;
        }
        .salary-extra-label {
            color: #1976d2;
            font-weight: 500;
            min-width: 120px;
            display: inline-block;
        }
        .salary-extra-input {
            width: 120px;
            font-size: 15px;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #b0bec5;
            background: #fff;
            text-align: right;
        }
        .salary-extra-note {
            color: #d32f2f;
            font-size: 13px;
            margin-left: 8px;
        }
        .salary-extra-vnd {
            color: #388e3c;
            font-weight: bold;
            margin-left: 8px;
        }
        .salary-final-row {
            font-weight: bold;
            color: #388e3c;
            font-size: 18px;
            background: linear-gradient(90deg, #e8f7ea 0%, #f2fdf3 100%);
        }
        .salary-detail-table th, .salary-detail-table td {
            padding: 10px 8px !important;
            font-size: 15px !important;
        }
        .salary-detail-table {
            margin-bottom: 0;
            width: 100%;
            background: #fcfeff;
            border-radius: 12px;

    <script>
        // ====== DỮ LIỆU ======
        let employees = JSON.parse(localStorage.getItem('employees') || '[]').filter(e => !e.hidden);
        let attendanceByMonth = JSON.parse(localStorage.getItem('attendanceByMonth') || '{}');
        let shiftsByEmpByMonth = JSON.parse(localStorage.getItem('shiftsByEmpByMonth') || '{}');
        let workFactorByMonth = JSON.parse(localStorage.getItem('workFactorByMonth') || '{}');
        // Dữ liệu các khoản phụ cấp, thưởng lễ, ứng, phạt
        let salaryExtrasByEmpMonth = JSON.parse(localStorage.getItem('salaryExtrasByEmpMonth') || '{}');
        // Dữ liệu tăng ca theo tháng/nhân viên
        let overtimeByMonth = JSON.parse(localStorage.getItem('overtimeByMonth') || '{}');

        function getCurrentMonth() {
            let m = document.getElementById('salaryMonth').value;
            if (!m) {
                const now = new Date();
                m = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
                document.getElementById('salaryMonth').value = m;
            }
            return m;
        }
        function daysInMonth(month) {
            const [y, m] = month.split('-').map(Number);
            return new Date(y, m, 0).getDate();
        }
        function roundSalaryValue(val) {
            const num = Number(val) || 0;
            return Math.floor(num / 1000) * 1000 + (num % 1000 >= 500 ? 1000 : 0);
        }
        function formatVND(val) {
            if (isNaN(val)) return '0 ₫';
            const num = roundSalaryValue(Number(val));
            return num.toLocaleString('vi-VN') + ' ₫';
        }
        function roundOvertimeValue(val) {
            return roundSalaryValue(val);
        }
        function formatOvertimeVND(val) {
            if (isNaN(val)) return '0 ₫';
            return roundOvertimeValue(val).toLocaleString('vi-VN') + ' ₫';
        }
        function calculateOvertimePay(empId, baseSalary, monthDays, overtimeHours) {
            return getOvertimeHourlyRate(empId, baseSalary, monthDays) * overtimeHours;
        }
        function formatVNDExact(val) {
            if (isNaN(val)) return '0 ₫';
            const num = Number(val) || 0;
            return num.toLocaleString('vi-VN', { maximumFractionDigits: 2 }) + ' ₫';
        }
        function parseCurrency(val) {
            return Number((val+'').replace(/[^\d\-]/g, '')) || 0;
        }
        function getOvertimeHourlyRate(empId, baseSalary, monthDays) {
            const baseDailyPay = Number(baseSalary) > 0 ? (Number(baseSalary) / (monthDays || 1)) : 0;
            const configuredDailyPay = parseInt(localStorage.getItem('salaryPerDay_' + empId)) || parseInt(localStorage.getItem('salaryPerDay') || '0');
            const dailyPay = baseDailyPay > 0 ? baseDailyPay : (configuredDailyPay > 0 ? configuredDailyPay : 0);
            return dailyPay > 0 ? dailyPay / 8 : 0;
        }
        function getOvertimeHoursForEmpMonth(empId, month, days) {
            let overtimeData = overtimeByMonth[month]?.[empId] || {};
            let overtimeHours = 0;
            for (let d = 1; d <= days; d++) {
                const item = overtimeData[String(d)] || { checked: false, hours: 0 };
                if (item.checked) overtimeHours += parseFloat(item.hours || 0);
            }
            return overtimeHours;
        }
        function countPayableWorkDays(empAtt, paidLeaveDays, monthDays, month, empId, shifts) {
            let count = 0;
            for (let d = 1; d <= monthDays; d++) {
                const dayKey = String(d);
                const rawValue = empAtt && (empAtt[d] ?? empAtt[dayKey] ?? empAtt[Number(d)]);
                let hasAttendance = false;
                let dayFactor = 1;
                if (rawValue !== undefined && rawValue !== null) {
                    if (Array.isArray(rawValue)) {
                        hasAttendance = rawValue.length > 0;
                        let total = 0;
                        for (let s of rawValue) {
                            const shift = shifts?.[s] || {};
                            const shiftVal = shift.half ? 0.5 : 1;
                            const factor = parseFloat(getWorkFactor(month, empId, `${d}_${s}`)) || 1;
                            total += shiftVal * factor;
                        }
                        dayFactor = total > 0 ? total : 1;
                    } else if (typeof rawValue === 'string') {
                        hasAttendance = rawValue.trim() !== '';
                    } else if (typeof rawValue === 'number') {
                        hasAttendance = !Number.isNaN(rawValue);
                    } else if (typeof rawValue === 'object') {
                        hasAttendance = Object.keys(rawValue).length > 0;
                    } else {
                        hasAttendance = true;
                    }
                }
                const isPaidLeave = Array.isArray(paidLeaveDays) && paidLeaveDays.some(item => String(item) === dayKey || Number(item) === d);
                if (hasAttendance) {
                    count += dayFactor;
                } else if (isPaidLeave) {
                    count += 1;
                }
            }
            return count;
        }
        function getShiftsForEmpMonth(empId, month) {
            if (!shiftsByEmpByMonth[month]) shiftsByEmpByMonth[month] = {};
            if (!shiftsByEmpByMonth[month][empId]) shiftsByEmpByMonth[month][empId] = [];
            return shiftsByEmpByMonth[month][empId];
        }
        function getWorkFactor(month, empId, dayShift) {
            if (!workFactorByMonth[month]) workFactorByMonth[month] = {};
            if (!workFactorByMonth[month][empId]) workFactorByMonth[month][empId] = {};
            if (typeof workFactorByMonth[month][empId][dayShift] === 'undefined') {
                workFactorByMonth[month][empId][dayShift] = 1;
            }
            return workFactorByMonth[month][empId][dayShift];
        }
        // Đọc lại dữ liệu từ localStorage của payroll.html nếu có
        function getSalaryExtras(empId, month) {
            // Nếu có dữ liệu từ payroll.html thì lấy, nếu không thì lấy dữ liệu hiện tại
            let payrollData = JSON.parse(localStorage.getItem('payrollData') || '{}');
            if (payrollData[month] && payrollData[month][empId]) {
                return payrollData[month][empId];
            }
            if (!salaryExtrasByEmpMonth[month]) salaryExtrasByEmpMonth[month] = {};
            if (!salaryExtrasByEmpMonth[month][empId]) {
                salaryExtrasByEmpMonth[month][empId] = {
                    allowance: 0,
                    bonus: 0,
                    advance: 0,
                    penalty: 0
                };
            }
            return salaryExtrasByEmpMonth[month][empId];
        }
        function saveSalaryExtras(empId, month, key, value) {
            if (!salaryExtrasByEmpMonth[month]) salaryExtrasByEmpMonth[month] = {};
            if (!salaryExtrasByEmpMonth[month][empId]) salaryExtrasByEmpMonth[month][empId] = {};
            salaryExtrasByEmpMonth[month][empId][key] = value;
            localStorage.setItem('salaryExtrasByEmpMonth', JSON.stringify(salaryExtrasByEmpMonth));
            renderSalaryTable();
        }
        function formatVNDInput(input) {
            let value = input.value.replace(/[^\d]/g, '');
            if (!value) value = '0';
            input.value = Number(value).toLocaleString('vi-VN');
        }
        function saveSalaryExtrasUI(key) {
            const empId = document.getElementById('empSelect').value;
            const month = getCurrentMonth();
            let val = document.getElementById('extra' + capitalize(key)).value;
            saveSalaryExtras(empId, month, key, parseCurrency(val));
        }
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function renderEmpSelect() {
            const sel = document.getElementById('empSelect');
            const store = document.getElementById('storeSelect').value;
            let filtered = employees;
            if (store) filtered = employees.filter(e => (e.store || '') === store);
            sel.innerHTML = filtered.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
            // Hiển thị/ẩn phần nhập doanh thu khi chọn nhân viên lương cơ bản
            setTimeout(() => {
                const empId = sel.value;
                const emp = employees.find(e => e.id == empId);
                document.getElementById('revenueInputCell').style.display = (emp && emp.salary_type === 'base') ? '' : 'none';
            }, 0);
        }

        function saveRevenueUI() {
            const empId = document.getElementById('empSelect').value;
            const month = getCurrentMonth();
            let val = document.getElementById('extraRevenue').value;
            let revenueData = JSON.parse(localStorage.getItem('revenueByEmpByMonth') || '{}');
            if (!revenueData[month]) revenueData[month] = {};
            revenueData[month][empId] = parseCurrency(val);
            localStorage.setItem('revenueByEmpByMonth', JSON.stringify(revenueData));
            renderSalaryTable();
        }

        function renderSalaryTable() {
            // Luôn nạp lại dữ liệu từ localStorage khi render để đảm bảo dữ liệu mới nhất khi chuyển tháng
            shiftsByEmpByMonth = JSON.parse(localStorage.getItem('shiftsByEmpByMonth') || '{}');
            workFactorByMonth = JSON.parse(localStorage.getItem('workFactorByMonth') || '{}');
            attendanceByMonth = JSON.parse(localStorage.getItem('attendanceByMonth') || '{}');
            salaryExtrasByEmpMonth = JSON.parse(localStorage.getItem('salaryExtrasByEmpMonth') || '{}');
            overtimeByMonth = JSON.parse(localStorage.getItem('overtimeByMonth') || '{}');
            const month = getCurrentMonth();
            const days = daysInMonth(month);
            const empId = document.getElementById('empSelect').value;
            if (!empId) {
                document.getElementById('salaryTableWrap').innerHTML = '<div style="color:#e53935;font-size:18px;padding:24px 0;text-align:center;">Vui lòng chọn nhân viên.</div>';
                return;
            }
            const emp = employees.find(e => e.id == empId);
            if (!emp) {
                document.getElementById('salaryTableWrap').innerHTML = '<div style="color:#e53935;font-size:18px;padding:24px 0;text-align:center;">Không tìm thấy nhân viên.</div>';
                return;
            }
            let empAtt = attendanceByMonth[month]?.[emp.id] || {};
            let shifts = getShiftsForEmpMonth(emp.id, month);
            let overtimeHours = getOvertimeHoursForEmpMonth(emp.id, month, days);
            let workDaysStd = parseInt(localStorage.getItem('workDaysStd_' + empId)) 
                || parseInt(localStorage.getItem('workDaysStd') || '26');
            let salaryPerDay = parseInt(localStorage.getItem('salaryPerDay_' + empId)) 
                || parseInt(localStorage.getItem('salaryPerDay') || '0');
            let extras = getSalaryExtras(emp.id, month);
            let paidLeaveDays = (JSON.parse(localStorage.getItem('paidLeaveDaysByMonth') || '{}')[month]?.[emp.id] || []) || [];

            // Luôn cập nhật lại các khoản phụ cấp, thưởng lễ, ứng, phạt từ localStorage khi render
            document.getElementById('extraAllowance').value = extras.allowance ? Number(extras.allowance).toLocaleString('vi-VN') : '';
            document.getElementById('extraBonus').value = extras.bonus ? Number(extras.bonus).toLocaleString('vi-VN') : '';
            document.getElementById('extraAdvance').value = extras.advance ? Number(extras.advance).toLocaleString('vi-VN') : '';
            document.getElementById('extraPenalty').value = extras.penalty ? Number(extras.penalty).toLocaleString('vi-VN') : '';
            // Hiển thị giá trị doanh thu trong ô nhập nếu là nhân viên lương cơ bản
            let revenueData = JSON.parse(localStorage.getItem('revenueByEmpByMonth') || '{}');
            let revenue = revenueData[getCurrentMonth()]?.[emp.id] || 0;
            if (emp.salary_type === 'base') {
                document.getElementById('revenueInputCell').style.display = '';
                document.getElementById('extraRevenue').value = revenue ? Number(revenue).toLocaleString('vi-VN') : '';
            } else {
                document.getElementById('revenueInputCell').style.display = 'none';
                document.getElementById('extraRevenue').value = '';
            }
            // Tính chi tiết từng ca
            let caCong = [];
            let caSalaries = [];
            let numShifts = shifts.length || 1;
            for(let s=0; s<numShifts; ++s) {
                let rowWork = 0;
                for(let d=1; d<=days; ++d) {
                    let checked = (empAtt[d] && empAtt[d].includes(s)) ? 'checked' : '';
                    let shiftVal = shifts[s]?.half ? 0.5 : 1;
                    let factor = getWorkFactor(month, emp.id, `${d}_${s}`);
                    if (checked) rowWork += shiftVal * factor;
                }
                caCong[s] = rowWork;
                let caSalary = parseInt(shifts[s]?.salary || 0);
                caSalaries[s] = caSalary;
            }
            let tongCong = caCong.reduce((a, b) => a + b, 0);
            let tongLuong = 0;
            let caThanhTien = [];
            let luongThucNhan = 0; // <-- Khai báo biến ở đây
            let html = `<div class="salary-card">`;
            html += `<div class="salary-card-header">
                <div>
                    <div class="salary-card-title">${emp.name}</div>
                    <div class="salary-card-subtitle">Bảng tính lương tháng ${month}</div>
                </div>
                <div class="salary-card-badge">${emp.salary_type === 'shift' ? 'Lương ca' : 'Lương cơ bản'}</div>
            </div>`;

            // Thêm ghi chú giải thích cách tính lương thực nhận
            html += `<div class="salary-summary-note">
                <b>Ghi chú:</b> <span style="color:#d32f2f;font-weight:bold;">Lương thực nhận</span> = Tổng lương (lương ca hoặc lương cơ bản theo ngày công)
                <span style="color:#388e3c;">+ Phụ cấp + Thưởng + Doanh thu (nếu có) + Tăng ca theo giờ</span>
                <span style="color:#d32f2f;">- Tiền ứng - Phạt</span>
                <br>
                <span style="color:#888;font-size:13px;">PL được tính như ngày công; KL không được tính vào lương.</span>
                <br>
                <span style="color:#888;font-size:13px;">Các khoản cộng/trừ này nhập ở phía trên, tùy loại nhân viên sẽ có thêm mục doanh thu.</span>
            </div>`;

            if (emp.salary_type === 'shift') {
                html += `<table class="salary-detail-table"><thead>
                    <tr>
                        <th>Ca làm việc</th>
                        <th>Số ca</th>
                        <th>Lương ca</th>
                        <th>Thành tiền</th>
                    </tr></thead><tbody>`;
                for(let s=0; s<numShifts; ++s) {
                    caThanhTien[s] = caCong[s] * caSalaries[s];
                    tongLuong += caThanhTien[s];
                    html += `<tr>
                        <td>${shifts[s]?.name || 'Ca ' + (s+1)}</td>
                        <td>${caCong[s]}</td>
                        <td>${formatVND(caSalaries[s])}</td>
                        <td>${formatVND(caThanhTien[s])}</td>
                    </tr>`;
                }
                // Thêm dòng tổng ca và tổng lương (đã thu nhỏ)
                html += `<tr style="background:#fff;">
                    <td colspan="4" style="padding:0;">
                    <div style="display:flex;justify-content:center;align-items:center;gap:10px;font-size:1rem;font-weight:bold;color:#222;">
                        <span class="salary-summary-chip">
                            TỔNG CA <span class="salary-summary-value">${tongCong}</span>
                        </span>
                        <span class="salary-summary-chip">
                            TỔNG LƯƠNG <span class="salary-summary-value">${formatVND(tongLuong)}</span>
                        </span>
                    </div>
                </td>
            </tr>`;
                html += `</tbody></table>`;

                // Tính tiền tăng ca theo giờ nếu có
                let overtimePay = calculateOvertimePay(emp.id, emp.base_salary || 0, days, overtimeHours);

                // Tính lương thực nhận cho nhân viên lương ca
                const roundedOvertimePay = roundOvertimeValue(overtimePay);
                luongThucNhan = tongLuong + parseCurrency(extras.allowance) + parseCurrency(extras.bonus)
                    - parseCurrency(extras.advance) - parseCurrency(extras.penalty)
                    + roundedOvertimePay;

                // Bảng chi tiết từng khoản như excel
                html += `<table class="salary-detail-table" style="margin-bottom:0;width:100%;"><thead>
                    <tr>
                        <th style="text-align:left;">Khoản mục</th>
                        <th style="text-align:right;">Số lượng</th>
                        <th style="text-align:right;">Số tiền</th>
                    </tr>
                </thead><tbody>
                    <tr>
                        <td style="text-align:left;">Tổng tiền lương ca</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">${formatVND(tongLuong)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Tăng ca theo giờ</td>
                        <td style="text-align:right;">${overtimeHours.toFixed(1).replace(/\.0$/, '')}h</td>
                        <td style="text-align:right;">${formatOvertimeVND(roundedOvertimePay)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Phụ cấp</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">${formatVND(extras.allowance)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Thưởng</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">${formatVND(extras.bonus)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Khấu trừ phạt</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">- ${formatVND(extras.penalty)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Khấu trừ ứng trước</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">- ${formatVND(extras.advance)}</td>
                    </tr>
                    <tr class="salary-final-row">
                        <td style="text-align:left;font-weight:bold;">Lương thực nhận</td>
                        <td></td>
                        <td style="text-align:right;font-weight:bold;font-size:1.2rem;">${formatVND(luongThucNhan)}</td>
                    </tr>
                </tbody></table>`;
            } else {
                // Làm lại bảng chi tiết lương cơ bản như excel
                let baseSalary = emp.base_salary || 0;
                let revenueData = JSON.parse(localStorage.getItem('revenueByEmpByMonth') || '{}');
                let revenue = revenueData[getCurrentMonth()]?.[emp.id] || 0;

                // Tính lương theo công thức: lương cơ bản / số ngày trong tháng × số ngày công thực tế
                let monthDays = days || 1;
                let actualWorkDays = countPayableWorkDays(empAtt, paidLeaveDays, monthDays, month, emp.id, shifts);
                let luongMotNgay = monthDays > 0 ? (baseSalary / monthDays) : 0;
                let luongMotNgayLamTronLen = Math.ceil(luongMotNgay);
                let luongNgayCong = Math.ceil(luongMotNgayLamTronLen * actualWorkDays);
                // Tổng lương trước cộng/trừ các khoản
                tongLuong = luongNgayCong;
                if (tongLuong < 0) tongLuong = 0;

                // Tính tiền tăng ca theo giờ
                let overtimePay = calculateOvertimePay(emp.id, baseSalary, monthDays, overtimeHours);

                // Tính lương thực nhận cho nhân viên lương cơ bản (cộng doanh thu và tăng ca)
                const roundedOvertimePay = roundOvertimeValue(overtimePay);
                luongThucNhan = tongLuong + parseCurrency(extras.allowance) + parseCurrency(extras.bonus)
                    - parseCurrency(extras.advance) - parseCurrency(extras.penalty)
                    + parseCurrency(revenue) + roundedOvertimePay;

                // Bảng chi tiết từng khoản như excel
                html += `<table class="salary-detail-table" style="margin-bottom:0;width:100%;"><thead>
                    <tr>
                        <th style="text-align:left;">Khoản mục</th>
                        <th style="text-align:right;">Số lượng</th>
                        <th style="text-align:right;">Số tiền</th>
                    </tr>
                </thead><tbody>
                    <tr>
                        <td style="text-align:left;">Lương cơ bản</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">${formatVND(baseSalary)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Lương theo ngày công</td>
                        <td style="text-align:right;">${monthDays}</td>
                        <td style="text-align:right;">${formatVND(luongMotNgayLamTronLen || 0)} / ngày</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Tăng ca theo giờ</td>
                        <td style="text-align:right;">${overtimeHours.toFixed(1).replace(/\.0$/, '')}h</td>
                        <td style="text-align:right;">${formatOvertimeVND(roundedOvertimePay)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;font-weight:bold;">Số ngày công thực tế (PL tính công)</td>
                        <td style="text-align:right;font-weight:bold;">${actualWorkDays}</td>
                        <td style="text-align:right;font-weight:bold;">
                            <span style="color:#1976d2;font-weight:bold;">
                                Quy ra tiền: ${formatVND(luongNgayCong)}
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Phụ cấp</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">${formatVND(extras.allowance)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Thưởng</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">${formatVND(extras.bonus)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Khấu trừ phạt</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">- ${formatVND(extras.penalty)}</td>
                    </tr>
                    <tr>
                        <td style="text-align:left;">Khấu trừ ứng trước</td>
                        <td style="text-align:right;"></td>
                        <td style="text-align:right;">- ${formatVND(extras.advance)}</td>
                    </tr>
                    <tr class="salary-final-row">
                        <td style="text-align:left;font-weight:bold;">Lương thực nhận</td>
                        <td></td>
                        <td style="text-align:right;font-weight:bold;font-size:1.2rem;">${formatVND(luongThucNhan)}</td>
                    </tr>
                </tbody></table>`;
            }


            // Thêm thẻ chuyển sang baocaoluong.html
            html += `<div style="text-align:right;margin-top:18px;">
                <a href="baocaoluong.html" style="color:#1976d2;font-weight:bold;text-decoration:underline;font-size:1.05rem;">Chuyển sang báo cáo lương</a>
            </div>`;

            document.getElementById('salaryTableWrap').innerHTML = html + '</div>';
        }

        // ====== KHỞI TẠO ======
        (function(){
            const now = new Date();
            const ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            const salaryMonthInput = document.getElementById('salaryMonth');
            if (salaryMonthInput.value !== ym) salaryMonthInput.value = ym;
            renderEmpSelect();
            renderSalaryTable();
        })();
    </script>
    <script src="footer.js"></script>
    <script>renderFooter();</script>

</body>
</html>
