<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>GPS Tracker FULL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#000;color:#0f0;text-align:center;font-family:Arial;}
#map{height:55vh;}
#speed{font-size:60px;font-weight:bold;text-shadow:0 0 10px #0f0;}
#info{color:#ccc;margin-top:10px;}
</style>
</head>

<body>

<div id="map"></div>
<div id="speed">0.0 km/h</div>
<div id="info">Đang chạy...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== MAP =====
let map=L.map('map',{zoomSnap:0.5}).setView([10.8231,106.6297],18);

L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

// ===== MARKER =====
let marker=L.circleMarker([10.8231,106.6297],{
  radius:10,color:'#0f0',fillColor:'#0f0',fillOpacity:1
}).addTo(map);

// ===== PATH =====
let path=L.polyline([],{color:'#0f0',weight:5}).addTo(map);

// ===== DATA =====
let points=[];
let smoothLat=null,smoothLon=null;
let smoothSpeed=0;
let lastBearing=0;

let lastFetch={lat:0,lon:0};
let roadCache="",poiCache="";

// ===== UTILS =====
function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
  Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function smoothPos(lat,lon){
  if(smoothLat===null){smoothLat=lat;smoothLon=lon;}
  smoothLat=smoothLat*0.7+lat*0.3;
  smoothLon=smoothLon*0.7+lon*0.3;
  return [smoothLat,smoothLon];
}

function smooth(v){
  smoothSpeed=smoothSpeed*0.7+v*0.3;
  return smoothSpeed;
}

function getBearing(a,b,c,d){
  let y=Math.sin((d-b)*Math.PI/180)*Math.cos(c*Math.PI/180);
  let x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-
  Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
  Math.cos((d-b)*Math.PI/180);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function dirText(b){
  if(b<45||b>=315)return"↑ Bắc";
  if(b<135)return"→ Đông";
  if(b<225)return"↓ Nam";
  return"← Tây";
}

function speedLimit(n){
  if(!n)return null;
  n=n.toLowerCase();
  if(n.includes("cao tốc"))return 100;
  if(n.includes("quốc lộ"))return 80;
  if(n.includes("đường"))return 50;
  return 40;
}

function speedStatus(s,l){
  if(!l)return"Không rõ";
  let p=s/l;
  if(p<0.4)return"🐢 Chậm";
  if(p<0.8)return"🚶 TB";
  if(p<=1)return"🚗 Nhanh";
  return"🚨 Vượt!";
}

function color(st){
  let el=document.getElementById("speed");
  if(st.includes("Vượt"))el.style.color="red";
  else if(st.includes("Nhanh"))el.style.color="orange";
  else if(st.includes("TB"))el.style.color="yellow";
  else el.style.color="#0f0";
}

function shouldFetch(lat,lon){
  return getDistance(lat,lon,lastFetch.lat,lastFetch.lon)>0.05;
}

// ===== API =====
async function getRoad(lat,lon){
  try{
    let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    let d=await r.json();
    return d.address.road||d.display_name;
  }catch{return"Không rõ";}
}

function isAhead(ulat,ulon,plat,plon,b){
  let bb=getBearing(ulat,ulon,plat,plon);
  return Math.abs(bb-b)<60;
}

async function getPOI(lat,lon){
  let q=`[out:json];(node(around:120,${lat},${lon})["highway"="traffic_signals"];way(around:120,${lat},${lon})["tunnel"="yes"];);out center;`;
  try{
    let r=await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(q));
    let d=await r.json();
    let m=[];
    d.elements.forEach(e=>{
      let la=e.lat||e.center?.lat;
      let lo=e.lon||e.center?.lon;
      if(!la)return;
      if(!isAhead(lat,lon,la,lo,lastBearing))return;
      if(e.tags?.highway==="traffic_signals")m.push("🚦 Đèn đỏ");
      if(e.tags?.tunnel==="yes")m.push("🕳️ Hầm");
    });
    return m.join("<br>");
  }catch{return"";}
}

// ===== MAIN =====
async function update(pos){
  let {latitude,longitude,accuracy,speed}=pos.coords;
  let time=pos.timestamp;

  if(accuracy>120)return;

  let latlng=smoothPos(latitude,longitude);

  marker.setLatLng(latlng);
  map.panTo(latlng);

  points.push({lat:latlng[0],lon:latlng[1],time});
  if(points.length>100)points.shift();

  // 🟢 luôn vẽ line
  path.addLatLng(latlng);

  let sp=0;

  if(speed&&speed>0){
    sp=speed*3.6;
  }else if(points.length>=2){
    let p1=points[points.length-2];
    let p2=points[points.length-1];
    let d=getDistance(p1.lat,p1.lon,p2.lat,p2.lon);
    let dt=(p2.time-p1.time)/1000;
    if(dt>0)sp=(d/dt)*3600;
  }

  if(sp<3)sp=0;
  sp=smooth(sp);

  if(points.length>=2){
    let p1=points[points.length-2];
    let p2=points[points.length-1];
    lastBearing=getBearing(p1.lat,p1.lon,p2.lat,p2.lon);
  }

  let zoom=18;
  if(sp>60)zoom=15;
  else if(sp>30)zoom=16;
  else if(sp>10)zoom=17;
  map.setZoom(zoom);

  if(shouldFetch(latitude,longitude)){
    lastFetch={lat:latitude,lon:longitude};
    roadCache=await getRoad(latitude,longitude);
    poiCache=await getPOI(latitude,longitude);
  }

  let dir=dirText(lastBearing);
  let limit=speedLimit(roadCache);
  let st=speedStatus(sp,limit);

  color(st);

  let q="🟢 Tốt";
  if(accuracy>20)q="🟡 TB";
  if(accuracy>50)q="🔴 Kém";

  document.getElementById("speed").innerText=sp.toFixed(1)+" km/h";

  document.getElementById("info").innerHTML=
  `📍 ${roadCache}<br>
   🧭 ${dir}<br>
   🚧 ${limit?limit+" km/h":"??"}<br>
   ⚡ ${st}<br>
   ${poiCache?poiCache+"<br>":""}
   🎯 ${accuracy.toFixed(0)}m (${q})`;
}

navigator.geolocation.watchPosition(update,console.error,{
  enableHighAccuracy:true,
  maximumAge:0,
  timeout:5000
});
</script>

</body>
</html>
