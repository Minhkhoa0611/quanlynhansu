<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sound Meter Pro Max</title>

<style>
body {
    background: #0f172a;
    color: white;
    text-align: center;
    font-family: Arial;
}

canvas {
    margin-top: 20px;
}

#value {
    font-size: 42px;
    font-weight: bold;
    margin-top: 10px;
}

#peak {
    color: red;
    font-size: 16px;
}
</style>
</head>
<body>

<h2>🎤 SOUND LEVEL METER</h2>
<canvas id="gauge" width="320" height="320"></canvas>

<div id="value">0 dB</div>
<div id="peak">Peak: 0 dB</div>

<script>
const canvas = document.getElementById("gauge");
const ctx = canvas.getContext("2d");

let smoothDb = 0;
let needleValue = 0;
let peak = 0;

function drawGauge(value, peakValue) {
    ctx.clearRect(0, 0, 320, 320);

    const cx = 160;
    const cy = 160;
    const r = 120;

    // ===== VÒNG MÀU =====
    function arc(start, end, color) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, start, end);
        ctx.lineWidth = 18;
        ctx.strokeStyle = color;
        ctx.stroke();
    }

    arc(Math.PI, Math.PI + 0.4*Math.PI, "lime");
    arc(Math.PI + 0.4*Math.PI, Math.PI + 0.7*Math.PI, "yellow");
    arc(Math.PI + 0.7*Math.PI, 2*Math.PI, "red");

    // ===== VẠCH CHIA =====
    for (let i = 0; i <= 100; i += 5) {
        let angle = Math.PI + (i/100)*Math.PI;

        let inner = r - (i % 20 === 0 ? 20 : 10);
        let outer = r + 2;

        let x1 = cx + Math.cos(angle)*inner;
        let y1 = cy + Math.sin(angle)*inner;
        let x2 = cx + Math.cos(angle)*outer;
        let y2 = cy + Math.sin(angle)*outer;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // ===== SỐ =====
    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.textAlign = "center";

    for (let i = 0; i <= 100; i += 20) {
        let angle = Math.PI + (i/100)*Math.PI;
        let x = cx + Math.cos(angle)*(r - 35);
        let y = cy + Math.sin(angle)*(r - 35);

        ctx.fillText(i, x, y);
    }

    // ===== KIM =====
    let angle = Math.PI + (value/100)*Math.PI;
    let x = cx + Math.cos(angle)*90;
    let y = cy + Math.sin(angle)*90;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.strokeStyle = "#00e5ff";
    ctx.lineWidth = 4;
    ctx.stroke();

    // ===== PEAK =====
    let peakAngle = Math.PI + (peakValue/100)*Math.PI;
    let px = cx + Math.cos(peakAngle)*100;
    let py = cy + Math.sin(peakAngle)*100;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px, py);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.stroke();

    // ===== TÂM =====
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, 2*Math.PI);
    ctx.fillStyle = "#00e5ff";
    ctx.fill();
}

// ===== AUDIO =====
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const mic = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();

    analyser.fftSize = 256;
    const data = new Uint8Array(analyser.frequencyBinCount);

    mic.connect(analyser);

    function loop() {
        analyser.getByteTimeDomainData(data);

        let sum = 0;
        for (let i = 0; i < data.length; i++) {
            let x = data[i] - 128;
            sum += x * x;
        }

        let rms = Math.sqrt(sum / data.length);
        let db = 20 * Math.log10(rms);

        if (!isFinite(db)) db = -100;

        // ===== SMOOTH =====
        smoothDb += (db - smoothDb) * 0.1;

        // ===== KIM MƯỢT =====
        let target = Math.min(100, rms * 2);
        needleValue += (target - needleValue) * 0.15;

        // ===== PEAK =====
        if (smoothDb > peak) peak = smoothDb;
        else peak -= 0.05; // rơi từ từ

        drawGauge(needleValue, Math.min(100, peak * 1.5));

        document.getElementById("value").innerText =
            smoothDb.toFixed(1) + " dB";

        document.getElementById("peak").innerText =
            "Peak: " + peak.toFixed(1) + " dB";

        requestAnimationFrame(loop);
    }

    loop();
})
.catch(err => {
    alert("Không mở được micro: " + err);
});
</script>

</body>
</html>
